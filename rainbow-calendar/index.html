<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastel Rainbow Year-at-a-Glance Planner</title>
  <style>
    :root {
      --bg: #faf7fb;
      --card: #ffffff;
      --ink: #2f2a33;
      --muted: #746c78;
      --line: #e7dfea;
      --shadow: 0 10px 30px rgba(87, 66, 100, 0.08);
      --font: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, #fff2f7 0%, transparent 28%),
        radial-gradient(circle at top right, #eef7ff 0%, transparent 28%),
        var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
    }

    .app {
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
      position: sticky;
      top: 10px;
      z-index: 20;
      backdrop-filter: blur(10px);
    }

    .topbar h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2.6vw, 2.2rem);
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .controls {
      display: grid;
      grid-template-columns: 110px 120px 140px 170px 170px repeat(5, minmax(110px, 1fr));
      gap: 10px;
      margin-top: 16px;
      align-items: end;
    }

    .field {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: bold;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button, textarea {
      font: inherit;
    }

    input[type="number"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 11px 12px;
      font-weight: bold;
      cursor: pointer;
      background: #f1e8f7;
      color: var(--ink);
      box-shadow: 0 4px 10px rgba(87, 66, 100, 0.08);
      transition: transform 0.12s ease, background 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: #e9dbf4;
    }

    .primary {
      background: #dff4e6;
    }

    .primary:hover {
      background: #d1eedc;
    }

    .danger {
      background: #ffe6eb;
    }

    .danger:hover {
      background: #ffd8e1;
    }

    .status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .planner-wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: auto;
      padding: 14px;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(180px, 1fr));
      gap: 10px;
      min-width: 2200px;
    }

    .month-column {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .month-header {
      padding: 10px 10px 8px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .month-title {
      margin: 0;
      text-align: center;
      font-size: 0.95rem;
      font-weight: bold;
    }

    .month-tip {
      margin: 5px 0 0;
      font-size: 0.68rem;
      text-align: center;
      color: #524b58;
      line-height: 1.25;
      min-height: 34px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td {
      border-bottom: 1px solid #eee6f0;
      vertical-align: top;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .day-num {
      width: 28px;
      min-width: 28px;
      text-align: center;
      font-size: 0.75rem;
      padding: 6px 4px;
      color: #3d3742;
      border-right: 1px solid #eee6f0;
      background: rgba(255,255,255,0.55);
    }

    .day-num.weekend {
      color: #d94a57;
      font-weight: bold;
    }

    .event-cell {
      padding: 0;
    }

    .day-input {
      width: 100%;
      min-height: 26px;
      border: none;
      resize: none;
      padding: 6px 7px;
      background: transparent;
      color: var(--ink);
      font-size: 0.72rem;
      line-height: 1.2;
      outline: none;
      overflow: hidden;
      white-space: pre-wrap;
    }

    textarea.day-input {
      display: block;
    }

    .holiday-row .day-input {
      font-weight: 600;
    }

    .month-0  .month-header, .month-print-view.month-0 .month-print-header { background: #ffd9e5; }
    .month-1  .month-header, .month-print-view.month-1 .month-print-header { background: #ffe7cf; }
    .month-2  .month-header, .month-print-view.month-2 .month-print-header { background: #fff4c7; }
    .month-3  .month-header, .month-print-view.month-3 .month-print-header { background: #e3f5d5; }
    .month-4  .month-header, .month-print-view.month-4 .month-print-header { background: #d8f4df; }
    .month-5  .month-header, .month-print-view.month-5 .month-print-header { background: #d9f4f1; }
    .month-6  .month-header, .month-print-view.month-6 .month-print-header { background: #ddeeff; }
    .month-7  .month-header, .month-print-view.month-7 .month-print-header { background: #e5e2ff; }
    .month-8  .month-header, .month-print-view.month-8 .month-print-header { background: #efe1ff; }
    .month-9  .month-header, .month-print-view.month-9 .month-print-header { background: #ffe2f4; }
    .month-10 .month-header, .month-print-view.month-10 .month-print-header { background: #eee7f7; }
    .month-11 .month-header, .month-print-view.month-11 .month-print-header { background: #ffdce7; }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 12px 4px 0;
    }

    .month-print-view {
      display: none;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .month-print-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .month-print-header h2 {
      margin: 0;
      font-size: 2rem;
      text-align: center;
    }

    .month-print-tip {
      margin-top: 8px;
      text-align: center;
      color: #5b5360;
      font-size: 0.95rem;
    }

    .month-print-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .month-print-weekday {
      padding: 10px 8px;
      text-align: center;
      font-weight: bold;
      font-size: 0.92rem;
      border-bottom: 1px solid #eadfee;
      border-right: 1px solid #eadfee;
      background: rgba(255,255,255,0.7);
    }

    .month-print-weekday:nth-child(7) {
      border-right: none;
    }

    .month-print-day {
      min-height: 145px;
      border-right: 1px solid #eadfee;
      border-bottom: 1px solid #eadfee;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #fff;
    }

    .month-print-day:nth-child(7n) {
      border-right: none;
    }

    .month-print-day.empty {
      background: #fbf9fc;
    }

    .month-print-day-num {
      font-size: 0.9rem;
      font-weight: bold;
      color: #3d3742;
    }

    .month-print-day-num.weekend {
      color: #d94a57;
    }

    .month-print-events {
      font-size: 0.82rem;
      line-height: 1.3;
      white-space: pre-wrap;
      color: #2f2a33;
    }

    .print-year-page {
      display: none;
    }

    .print-year-header {
      display: none;
    }

    #printYearGrid {
      display: grid;
      grid-template-columns: repeat(12, minmax(180px, 1fr));
      gap: 10px;
      transform-origin: center center;
    }

    @media (max-width: 1200px) {
      .controls {
        grid-template-columns: repeat(2, 1fr);
      }

      .topbar {
        position: static;
      }
    }

    @media print {
      html, body {
        background: #fff !important;
        width: 100%;
        height: 100%;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
      }

      body {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .topbar,
      .footer-note {
        display: none !important;
      }

      .app {
        max-width: none;
        width: 100%;
        padding: 0 !important;
        margin: 0 !important;
      }

      .planner-wrap {
        box-shadow: none !important;
        border: none !important;
        border-radius: 0 !important;
        padding: 0 !important;
        margin: 0 !important;
        overflow: hidden !important;
        background: #fff !important;
        width: 100%;
        height: 100%;
      }

      body.print-year .planner-wrap {
        display: none !important;
      }

      body.print-year .print-year-page {
        display: flex !important;
        width: 100vw;
        height: 100vh;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 4mm;
      }

      body.print-year .print-year-header {
        display: block !important;
        width: 100%;
        text-align: left;
        font-size: 14pt;
        font-weight: 700;
        color: #2f2a33;
        margin-bottom: 4mm;
      }

      body.print-year .print-year-content {
        width: 100%;
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      body.print-year #printYearGrid {
        min-width: 0 !important;
        margin: 0 auto !important;
        gap: 4px !important;
      }

      body.print-year #printYearGrid .month-column {
        display: block !important;
      }

      body.print-year #printYearGrid .day-input {
        min-height: 14px !important;
        font-size: 6pt !important;
        line-height: 1.05 !important;
        padding: 3px 4px !important;
      }

      body.print-year #printYearGrid .day-num {
        font-size: 6pt !important;
        width: 18px !important;
        min-width: 18px !important;
        padding: 2px 1px !important;
      }

      body.print-year #printYearGrid .month-title {
        font-size: 7pt !important;
      }

      body.print-year #printYearGrid .month-tip {
        font-size: 4.8pt !important;
        line-height: 1.1 !important;
        min-height: auto !important;
        margin-top: 3px !important;
      }

      body.print-year #printYearGrid .month-header {
        padding: 4px 4px 3px !important;
      }

      body.print-month .print-year-page {
        display: none !important;
      }

      body.print-month .year-grid {
        display: none !important;
      }

      body.print-month .month-print-view {
        display: block !important;
        width: 100% !important;
        height: 100% !important;
        box-shadow: none !important;
        border: none !important;
        border-radius: 0 !important;
      }

      body.print-month .planner-wrap {
        padding: 0 !important;
      }

      body.print-month .month-print-header {
        padding: 10mm 8mm 6mm !important;
      }

      body.print-month .month-print-header h2 {
        font-size: 22pt !important;
      }

      body.print-month .month-print-tip {
        font-size: 10pt !important;
        margin-top: 4mm !important;
      }

      body.print-month .month-print-weekday {
        font-size: 10pt !important;
        padding: 3mm 2mm !important;
      }

      body.print-month .month-print-day {
        min-height: 0 !important;
        height: calc((100vh - 42mm) / 6) !important;
        padding: 2.5mm !important;
      }

      body.print-month .month-print-day-num {
        font-size: 10pt !important;
      }

      body.print-month .month-print-events {
        font-size: 8.5pt !important;
        line-height: 1.25 !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="topbar">
      <h1>Pastel Rainbow Year-at-a-Glance Planner</h1>
      <p>
        Fill your whole year, print it with colours, and export it to Excel. Still a spreadsheet at heart, obviously.
        Just wearing a cardigan now.
      </p>

      <div class="controls">
        <div class="field">
          <label for="yearInput">Year</label>
          <input id="yearInput" type="number" min="2020" max="2035" />
        </div>

        <div class="field">
          <label for="paperSize">Print size</label>
          <select id="paperSize">
            <option value="A4">A4</option>
            <option value="A3" selected>A3</option>
          </select>
        </div>

        <div class="field">
          <label for="orientation">Orientation</label>
          <select id="orientation">
            <option value="landscape" selected>Landscape</option>
            <option value="portrait">Portrait</option>
          </select>
        </div>

        <div class="field">
          <label for="printMode">Print what</label>
          <select id="printMode">
            <option value="year" selected>Entire year</option>
            <option value="month">One month only</option>
          </select>
        </div>

        <div class="field">
          <label for="printMonth">Month to print</label>
          <select id="printMonth"></select>
        </div>

        <button class="primary" id="generateBtn">Generate / Refresh</button>
        <button id="saveBtn">Save to browser</button>
        <button id="printBtn">Print</button>
        <button id="csvBtn">Download CSV</button>
        <button class="danger" id="clearBtn">Clear this year</button>
      </div>

      <div class="status" id="status"></div>
    </section>

    <section class="planner-wrap">
      <div class="year-grid" id="yearGrid"></div>
      <div class="month-print-view" id="monthPrintView"></div>
    </section>

    <section class="print-year-page" id="printYearPage">
      <div class="print-year-header" id="printYearHeader"></div>
      <div class="print-year-content">
        <div id="printYearGrid"></div>
      </div>
    </section>

    <div class="footer-note">
      Blank days stay blank. Which is frankly the most emotionally mature feature here.
    </div>
  </div>

  <script>
    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    const weekdayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

    const yearInput = document.getElementById("yearInput");
    const yearGrid = document.getElementById("yearGrid");
    const printYearGrid = document.getElementById("printYearGrid");
    const monthPrintView = document.getElementById("monthPrintView");
    const printYearHeader = document.getElementById("printYearHeader");
    const statusEl = document.getElementById("status");
    const paperSizeEl = document.getElementById("paperSize");
    const orientationEl = document.getElementById("orientation");
    const printModeEl = document.getElementById("printMode");
    const printMonthEl = document.getElementById("printMonth");

    yearInput.value = new Date().getFullYear();

    monthNames.forEach((month, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = month;
      printMonthEl.appendChild(option);
    });

    function storageKey(year) {
      return `year-at-a-glance-${year}`;
    }

    function showStatus(message) {
      statusEl.textContent = message;
      clearTimeout(showStatus.timer);
      showStatus.timer = setTimeout(() => {
        statusEl.textContent = "";
      }, 3000);
    }

    function loadData(year) {
      const raw = localStorage.getItem(storageKey(year));
      return raw ? JSON.parse(raw) : {};
    }

    function saveData(year, data) {
      localStorage.setItem(storageKey(year), JSON.stringify(data));
    }

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function formatDateKey(year, month, day) {
      return `${year}-${pad(month + 1)}-${pad(day)}`;
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function getDayOfWeek(year, month, day) {
      return new Date(year, month, day).getDay();
    }

    function getFirstDayOfMonth(year, month) {
      return new Date(year, month, 1).getDay();
    }

    function getEasterSunday(year) {
      const a = year % 19;
      const b = Math.floor(year / 100);
      const c = year % 100;
      const d = Math.floor(b / 4);
      const e = b % 4;
      const f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3);
      const h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4);
      const k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
      const day = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(year, month, day);
    }

    function nthWeekdayOfMonth(year, month, weekday, nth) {
      let count = 0;
      for (let day = 1; day <= 31; day++) {
        const date = new Date(year, month, day);
        if (date.getMonth() !== month) break;
        if (date.getDay() === weekday) {
          count++;
          if (count === nth) return date;
        }
      }
      return null;
    }

    function observedIfWeekend(date) {
      const day = date.getDay();
      if (day === 6) return new Date(date.getFullYear(), date.getMonth(), date.getDate() + 2);
      if (day === 0) return new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1);
      return date;
    }

    function addHoliday(map, date, name) {
      const key = formatDateKey(date.getFullYear(), date.getMonth(), date.getDate());
      map[key] = name;
    }

    function getNswPublicHolidays(year) {
      const holidays = {};

      addHoliday(holidays, new Date(year, 0, 1), "New Year's Day");

      const australiaDayActual = new Date(year, 0, 26);
      addHoliday(holidays, observedIfWeekend(australiaDayActual), "Australia Day");

      const easterSunday = getEasterSunday(year);
      const goodFriday = new Date(easterSunday);
      goodFriday.setDate(easterSunday.getDate() - 2);

      const easterSaturday = new Date(easterSunday);
      easterSaturday.setDate(easterSunday.getDate() - 1);

      const easterMonday = new Date(easterSunday);
      easterMonday.setDate(easterSunday.getDate() + 1);

      addHoliday(holidays, goodFriday, "Good Friday");
      addHoliday(holidays, easterSaturday, "Easter Saturday");
      addHoliday(holidays, easterSunday, "Easter Sunday");
      addHoliday(holidays, easterMonday, "Easter Monday");

      addHoliday(holidays, new Date(year, 3, 25), "Anzac Day");
      addHoliday(holidays, nthWeekdayOfMonth(year, 5, 1, 2), "King's Birthday");
      addHoliday(holidays, nthWeekdayOfMonth(year, 9, 1, 1), "Labour Day");

      const christmas = new Date(year, 11, 25);
      const boxingDay = new Date(year, 11, 26);

      if (christmas.getDay() === 6) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, new Date(year, 11, 27), "Additional Day");
        addHoliday(holidays, new Date(year, 11, 28), "Boxing Day");
      } else if (christmas.getDay() === 0) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, new Date(year, 11, 26), "Additional Day");
        addHoliday(holidays, new Date(year, 11, 27), "Boxing Day");
      } else if (boxingDay.getDay() === 6) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, boxingDay, "Boxing Day");
        addHoliday(holidays, new Date(year, 11, 28), "Additional Day");
      } else if (boxingDay.getDay() === 0) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, boxingDay, "Boxing Day");
        addHoliday(holidays, new Date(year, 11, 28), "Additional Day");
      } else {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, boxingDay, "Boxing Day");
      }

      return holidays;
    }

    function getMonthSurvivalTip(monthIndex) {
      const tips = [
        "Survive January: hydrate and lower expectations.",
        "Survive February: it’s short, thank God.",
        "Survive March: admin begins its annual attack.",
        "Survive April: Easter chocolate and strategic disappearing.",
        "Survive May: Mother's Day and emotional paperwork.",
        "Survive June: long weekend, cold toes, keep moving.",
        "Survive July: school holidays and soup-based survival.",
        "Survive August: this month is basically stubbornness.",
        "Survive September: spring optimism with hidden admin.",
        "Survive October: Labour Day, then chaos resumes.",
        "Survive November: too many things, not enough soul.",
        "Survive December: festive sparkle, logistical violence."
      ];
      return tips[monthIndex];
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.max(el.scrollHeight, 24) + "px";
    }

    function getDayValue(year, monthIndex, day, savedData, holidays) {
      const dateKey = formatDateKey(year, monthIndex, day);
      const holidayText = holidays[dateKey] || "";
      return savedData[dateKey] !== undefined ? savedData[dateKey] : holidayText;
    }

    function buildMonthColumn(year, savedData, holidays, monthIndex, printable) {
      const monthName = monthNames[monthIndex];
      const monthEl = document.createElement("div");
      monthEl.className = `month-column month-${monthIndex}`;
      monthEl.dataset.monthIndex = String(monthIndex);

      const header = document.createElement("div");
      header.className = "month-header";
      header.innerHTML = `
        <h2 class="month-title">${monthName}</h2>
        <div class="month-tip">${getMonthSurvivalTip(monthIndex)}</div>
      `;

      const table = document.createElement("table");
      const tbody = document.createElement("tbody");
      const daysInMonth = getDaysInMonth(year, monthIndex);

      for (let day = 1; day <= daysInMonth; day++) {
        const tr = document.createElement("tr");
        const dateKey = formatDateKey(year, monthIndex, day);
        const weekday = getDayOfWeek(year, monthIndex, day);
        const holidayText = holidays[dateKey] || "";
        const savedText = getDayValue(year, monthIndex, day, savedData, holidays);

        if (holidayText) tr.classList.add("holiday-row");

        const dayTd = document.createElement("td");
        dayTd.className = "day-num" + ((weekday === 0 || weekday === 6) ? " weekend" : "");
        dayTd.textContent = day;

        const eventTd = document.createElement("td");
        eventTd.className = "event-cell";

        if (printable) {
          const div = document.createElement("div");
          div.className = "day-input";
          div.textContent = savedText;
          eventTd.appendChild(div);
        } else {
          const textarea = document.createElement("textarea");
          textarea.className = "day-input";
          textarea.value = savedText;
          textarea.dataset.date = dateKey;
          textarea.spellcheck = false;
          textarea.addEventListener("input", () => {
            autoResize(textarea);
            saveCurrentYear();
          });
          eventTd.appendChild(textarea);
          requestAnimationFrame(() => autoResize(textarea));
        }

        tr.appendChild(dayTd);
        tr.appendChild(eventTd);
        tbody.appendChild(tr);
      }

      table.appendChild(tbody);
      monthEl.appendChild(header);
      monthEl.appendChild(table);
      return monthEl;
    }

    function buildScreenYearGrid() {
      const year = Number(yearInput.value);
      const savedData = loadData(year);
      const holidays = getNswPublicHolidays(year);

      yearGrid.innerHTML = "";
      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        yearGrid.appendChild(buildMonthColumn(year, savedData, holidays, monthIndex, false));
      }
    }

    function buildPrintYearGrid() {
      const year = Number(yearInput.value);
      const savedData = loadData(year);
      const holidays = getNswPublicHolidays(year);

      printYearHeader.textContent = `Year at a Glance ${year}`;
      printYearGrid.innerHTML = "";

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        printYearGrid.appendChild(buildMonthColumn(year, savedData, holidays, monthIndex, true));
      }
    }

    function buildMonthPrintView() {
      const year = Number(yearInput.value);
      const monthIndex = Number(printMonthEl.value || 0);
      const savedData = loadData(year);
      const holidays = getNswPublicHolidays(year);

      const monthName = monthNames[monthIndex];
      const firstDay = getFirstDayOfMonth(year, monthIndex);
      const daysInMonth = getDaysInMonth(year, monthIndex);
      const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

      monthPrintView.className = `month-print-view month-${monthIndex}`;
      monthPrintView.innerHTML = "";

      const header = document.createElement("div");
      header.className = "month-print-header";
      header.innerHTML = `
        <h2>${monthName} ${year}</h2>
        <div class="month-print-tip">${getMonthSurvivalTip(monthIndex)}</div>
      `;

      const weekdayGrid = document.createElement("div");
      weekdayGrid.className = "month-print-grid";
      weekdayNames.forEach(day => {
        const cell = document.createElement("div");
        cell.className = "month-print-weekday";
        cell.textContent = day;
        weekdayGrid.appendChild(cell);
      });

      const calendarGrid = document.createElement("div");
      calendarGrid.className = "month-print-grid";

      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement("div");
        cell.className = "month-print-day";

        if (i < firstDay || i >= firstDay + daysInMonth) {
          cell.classList.add("empty");
          calendarGrid.appendChild(cell);
          continue;
        }

        const day = i - firstDay + 1;
        const weekday = getDayOfWeek(year, monthIndex, day);
        const value = getDayValue(year, monthIndex, day, savedData, holidays);

        const dayNum = document.createElement("div");
        dayNum.className = "month-print-day-num" + ((weekday === 0 || weekday === 6) ? " weekend" : "");
        dayNum.textContent = day;

        const events = document.createElement("div");
        events.className = "month-print-events";
        events.textContent = value;

        cell.appendChild(dayNum);
        cell.appendChild(events);
        calendarGrid.appendChild(cell);
      }

      monthPrintView.appendChild(header);
      monthPrintView.appendChild(weekdayGrid);
      monthPrintView.appendChild(calendarGrid);
    }

    function buildAllViews() {
      buildScreenYearGrid();
      buildPrintYearGrid();
      buildMonthPrintView();
      showStatus(`Loaded ${yearInput.value}. NSW public holidays are included.`);
    }

    function saveCurrentYear() {
      const year = Number(yearInput.value);
      const data = {};
      document.querySelectorAll("#yearGrid textarea.day-input").forEach(input => {
        if (input.value.trim() !== "") {
          data[input.dataset.date] = input.value.trim();
        }
      });
      saveData(year, data);
      buildPrintYearGrid();
      buildMonthPrintView();
    }

    function clearYear() {
      const year = Number(yearInput.value);
      const ok = confirm(`Clear everything for ${year}?`);
      if (!ok) return;
      localStorage.removeItem(storageKey(year));
      buildAllViews();
      showStatus(`Cleared ${year}. A brutal reset.`);
    }

    function exportCSV() {
      const year = Number(yearInput.value);
      const data = loadData(year);
      let csv = "Date,Month,Day,Event\n";

      monthNames.forEach((monthName, monthIndex) => {
        const daysInMonth = getDaysInMonth(year, monthIndex);
        for (let day = 1; day <= daysInMonth; day++) {
          const key = formatDateKey(year, monthIndex, day);
          const value = (data[key] || "").replace(/"/g, '""').replace(/\n/g, " | ");
          csv += `"${key}","${monthName}","${day}","${value}"\n`;
        }
      });

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `year-at-a-glance-${year}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      showStatus("CSV downloaded.");
    }

    function setPrintPageStyle() {
      const size = paperSizeEl.value;
      const orientation = orientationEl.value;

      const styleId = "dynamic-print-style";
      let styleTag = document.getElementById(styleId);

      if (!styleTag) {
        styleTag = document.createElement("style");
        styleTag.id = styleId;
        document.head.appendChild(styleTag);
      }

      styleTag.textContent = `
        @page {
          size: ${size} ${orientation};
          margin: 4mm;
        }
      `;
    }

    function fitPrintYearToOnePage() {
      printYearGrid.style.transform = "scale(1)";
      printYearGrid.style.width = "";
      printYearGrid.style.height = "";

      if (printModeEl.value !== "year") return;

      const size = paperSizeEl.value;
      const orientation = orientationEl.value;

      let pageWidthMm = 297;
      let pageHeightMm = 210;

      if (size === "A4" && orientation === "portrait") {
        pageWidthMm = 210;
        pageHeightMm = 297;
      } else if (size === "A4" && orientation === "landscape") {
        pageWidthMm = 297;
        pageHeightMm = 210;
      } else if (size === "A3" && orientation === "portrait") {
        pageWidthMm = 297;
        pageHeightMm = 420;
      } else if (size === "A3" && orientation === "landscape") {
        pageWidthMm = 420;
        pageHeightMm = 297;
      }

      const usableWidthPx = ((pageWidthMm - 8) / 25.4) * 96;
      const usableHeightPx = ((pageHeightMm - 18) / 25.4) * 96;

      const contentWidth = printYearGrid.scrollWidth;
      const contentHeight = printYearGrid.scrollHeight;

      const scaleX = usableWidthPx / contentWidth;
      const scaleY = usableHeightPx / contentHeight;
      const scale = Math.min(scaleX, scaleY, 1) * 0.92;

      printYearGrid.style.width = `${contentWidth}px`;
      printYearGrid.style.height = `${contentHeight}px`;
      printYearGrid.style.transform = `scale(${scale})`;
    }

    function preparePrintMode() {
      document.body.classList.remove("print-year", "print-month");

      if (printModeEl.value === "month") {
        buildMonthPrintView();
        document.body.classList.add("print-month");
      } else {
        buildPrintYearGrid();
        document.body.classList.add("print-year");
      }
    }

    function resetAfterPrint() {
      document.body.classList.remove("print-year", "print-month");
      printYearGrid.style.transform = "scale(1)";
      printYearGrid.style.width = "";
      printYearGrid.style.height = "";
    }

    function printPlanner() {
      saveCurrentYear();
      setPrintPageStyle();
      preparePrintMode();
      fitPrintYearToOnePage();

      requestAnimationFrame(() => {
        setTimeout(() => {
          window.print();
        }, 80);
      });
    }

    window.addEventListener("afterprint", resetAfterPrint);

    document.getElementById("generateBtn").addEventListener("click", buildAllViews);
    document.getElementById("saveBtn").addEventListener("click", () => {
      saveCurrentYear();
      showStatus("Saved to this browser.");
    });
    document.getElementById("printBtn").addEventListener("click", printPlanner);
    document.getElementById("csvBtn").addEventListener("click", exportCSV);
    document.getElementById("clearBtn").addEventListener("click", clearYear);

    yearInput.addEventListener("change", buildAllViews);

    printModeEl.addEventListener("change", () => {
      const isMonth = printModeEl.value === "month";
      printMonthEl.disabled = !isMonth;
      if (isMonth) buildMonthPrintView();
    });

    printMonthEl.addEventListener("change", buildMonthPrintView);

    printMonthEl.disabled = true;

    buildAllViews();
  </script>
</body>
</html>
