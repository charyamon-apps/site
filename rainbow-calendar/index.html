<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Year-at-a-Glance PDF Planner</title>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #faf7fb;
      --card: #ffffff;
      --ink: #2f2a33;
      --muted: #746c78;
      --line: #e7dfea;
      --shadow: 0 10px 30px rgba(87, 66, 100, 0.08);
      --font: Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, #fff2f7 0%, transparent 28%),
        radial-gradient(circle at top right, #eef7ff 0%, transparent 28%),
        var(--bg);
      color: var(--ink);
    }

    body { min-height: 100vh; }

    .app {
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
      position: sticky;
      top: 10px;
      z-index: 20;
      backdrop-filter: blur(10px);
    }

    .topbar h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2.6vw, 2.2rem);
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
      gap: 10px;
      margin-top: 16px;
      align-items: end;
    }

    .field {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: bold;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button, textarea {
      font: inherit;
    }

    input[type="number"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 11px 12px;
      font-weight: bold;
      cursor: pointer;
      background: #f1e8f7;
      color: var(--ink);
      box-shadow: 0 4px 10px rgba(87, 66, 100, 0.08);
      transition: transform 0.12s ease, background 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: #e9dbf4;
    }

    .primary {
      background: #dff4e6;
    }

    .primary:hover {
      background: #d1eedc;
    }

    .danger {
      background: #ffe6eb;
    }

    .danger:hover {
      background: #ffd8e1;
    }

    .status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .planner-wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: auto;
      padding: 14px;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(180px, 1fr));
      gap: 10px;
      min-width: 2200px;
    }

    .month-column {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .month-header {
      padding: 10px 10px 8px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .month-title {
      margin: 0;
      text-align: center;
      font-size: 0.95rem;
      font-weight: bold;
    }

    .month-tip {
      margin: 5px 0 0;
      font-size: 0.68rem;
      text-align: center;
      color: #524b58;
      line-height: 1.25;
      min-height: 34px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td {
      border-bottom: 1px solid #eee6f0;
      vertical-align: top;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .day-num {
      width: 28px;
      min-width: 28px;
      text-align: center;
      font-size: 0.75rem;
      padding: 6px 4px;
      color: #3d3742;
      border-right: 1px solid #eee6f0;
      background: rgba(255,255,255,0.55);
    }

    .day-num.weekend {
      color: #d94a57;
      font-weight: bold;
    }

    .event-cell {
      padding: 0;
    }

    textarea.day-input {
      width: 100%;
      min-height: 26px;
      border: none;
      resize: none;
      padding: 6px 7px;
      background: transparent;
      color: var(--ink);
      font-size: 0.72rem;
      line-height: 1.2;
      outline: none;
      overflow: hidden;
    }

    .holiday-row .day-input {
      font-weight: 600;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 12px 4px 0;
    }

    @media (max-width: 1200px) {
      .controls {
        grid-template-columns: repeat(2, 1fr);
      }

      .button-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .topbar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="topbar">
      <h1>Year-at-a-Glance PDF Planner</h1>
      <p>
        Fill your whole year, export it to Excel, and generate a PDF that can be tiny, readable, or completely unhinged.
      </p>

      <div class="controls">
        <div class="field">
          <label for="yearInput">Year</label>
          <input id="yearInput" type="number" min="2020" max="2035" />
        </div>

        <div class="field">
          <label for="paperSize">PDF size</label>
          <select id="paperSize">
            <option value="a4">A4</option>
            <option value="a3" selected>A3</option>
          </select>
        </div>

        <div class="field">
          <label for="orientation">Orientation</label>
          <select id="orientation">
            <option value="landscape" selected>Landscape</option>
            <option value="portrait">Portrait</option>
          </select>
        </div>

        <div class="field">
          <label for="printMode">Create PDF for</label>
          <select id="printMode">
            <option value="year" selected>Entire year</option>
            <option value="month">One month only</option>
          </select>
        </div>

        <div class="field">
          <label for="printMonth">Month to print</label>
          <select id="printMonth"></select>
        </div>

        <div class="field">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect"></select>
        </div>

        <div class="field">
          <label for="pdfScale">PDF text size</label>
          <select id="pdfScale">
            <option value="100">Standard</option>
            <option value="150">Large</option>
            <option value="500" selected>Ridiculously Large</option>
          </select>
        </div>
      </div>

      <div class="button-row">
        <button class="primary" id="generateBtn">Generate / Refresh</button>
        <button id="saveBtn">Save to browser</button>
        <button id="pdfBtn">Open PDF</button>
        <button id="csvBtn">Download CSV</button>
      </div>

      <div class="button-row">
        <button class="danger" id="clearBtn">Clear this year</button>
      </div>

      <div class="status" id="status"></div>
    </section>

    <section class="planner-wrap">
      <div class="year-grid" id="yearGrid"></div>
    </section>

    <div class="footer-note">
      Blank days stay blank. The rarest kind of emotional maturity.
    </div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    const weekdayNamesShort = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    const themes = {
      pastel: {
        name: "Soft Pastels",
        months: [
          [255, 217, 229], [255, 231, 207], [255, 244, 199], [227, 245, 213],
          [216, 244, 223], [217, 244, 241], [221, 238, 255], [229, 226, 255],
          [239, 225, 255], [255, 226, 244], [238, 231, 247], [255, 220, 231]
        ]
      },
      boho: {
        name: "Earth & Clay",
        months: [
          [230, 202, 183], [210, 178, 152], [191, 148, 112], [206, 188, 163],
          [177, 156, 129], [221, 196, 164], [193, 162, 141], [218, 176, 137],
          [198, 169, 145], [214, 186, 160], [186, 156, 133], [228, 204, 184]
        ]
      },
      greenery: {
        name: "Botanical Greens",
        months: [
          [222, 239, 220], [205, 230, 198], [190, 221, 182], [175, 214, 168],
          [199, 232, 201], [182, 221, 188], [165, 209, 176], [210, 235, 207],
          [193, 227, 192], [176, 214, 176], [160, 201, 162], [220, 240, 219]
        ]
      },
      clean: {
        name: "Clean & Bold",
        months: [
          [214, 226, 240], [198, 214, 231], [180, 200, 220], [214, 220, 228],
          [197, 208, 218], [178, 191, 203], [206, 217, 228], [188, 201, 215],
          [171, 187, 203], [219, 224, 230], [201, 209, 218], [184, 194, 206]
        ]
      },
      feminine: {
        name: "Blushed Bloom",
        months: [
          [255, 225, 233], [252, 213, 227], [248, 201, 220], [244, 210, 229],
          [255, 221, 239], [246, 204, 223], [238, 194, 215], [255, 230, 242],
          [249, 212, 231], [242, 198, 221], [251, 220, 235], [255, 229, 240]
        ]
      }
    };

    const yearInput = document.getElementById("yearInput");
    const yearGrid = document.getElementById("yearGrid");
    const statusEl = document.getElementById("status");
    const paperSizeEl = document.getElementById("paperSize");
    const orientationEl = document.getElementById("orientation");
    const printModeEl = document.getElementById("printMode");
    const printMonthEl = document.getElementById("printMonth");
    const themeSelect = document.getElementById("themeSelect");
    const pdfScaleEl = document.getElementById("pdfScale");

    yearInput.value = new Date().getFullYear();

    monthNames.forEach((month, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = month;
      printMonthEl.appendChild(option);
    });

    Object.entries(themes).forEach(([key, value]) => {
      const option = document.createElement("option");
      option.value = key;
      option.textContent = value.name;
      themeSelect.appendChild(option);
    });
    themeSelect.value = "pastel";

    function currentThemeMonths() {
      return themes[themeSelect.value].months;
    }

    function storageKey(year) {
      return `year-at-a-glance-${year}`;
    }

    function showStatus(message) {
      statusEl.textContent = message;
      clearTimeout(showStatus.timer);
      showStatus.timer = setTimeout(() => {
        statusEl.textContent = "";
      }, 3500);
    }

    function loadData(year) {
      const raw = localStorage.getItem(storageKey(year));
      return raw ? JSON.parse(raw) : {};
    }

    function saveData(year, data) {
      localStorage.setItem(storageKey(year), JSON.stringify(data));
    }

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function formatDateKey(year, month, day) {
      return `${year}-${pad(month + 1)}-${pad(day)}`;
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function getDayOfWeek(year, month, day) {
      return new Date(year, month, day).getDay();
    }

    function getFirstDayOfMonth(year, month) {
      return new Date(year, month, 1).getDay();
    }

    function getEasterSunday(year) {
      const a = year % 19;
      const b = Math.floor(year / 100);
      const c = year % 100;
      const d = Math.floor(b / 4);
      const e = b % 4;
      const f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3);
      const h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4);
      const k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
      const day = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(year, month, day);
    }

    function nthWeekdayOfMonth(year, month, weekday, nth) {
      let count = 0;
      for (let day = 1; day <= 31; day++) {
        const date = new Date(year, month, day);
        if (date.getMonth() !== month) break;
        if (date.getDay() === weekday) {
          count++;
          if (count === nth) return date;
        }
      }
      return null;
    }

    function observedIfWeekend(date) {
      const day = date.getDay();
      if (day === 6) return new Date(date.getFullYear(), date.getMonth(), date.getDate() + 2);
      if (day === 0) return new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1);
      return date;
    }

    function addHoliday(map, date, name) {
      const key = formatDateKey(date.getFullYear(), date.getMonth(), date.getDate());
      map[key] = name;
    }

    function getNswPublicHolidays(year) {
      const holidays = {};

      addHoliday(holidays, new Date(year, 0, 1), "New Year's Day");

      const australiaDayActual = new Date(year, 0, 26);
      addHoliday(holidays, observedIfWeekend(australiaDayActual), "Australia Day");

      const easterSunday = getEasterSunday(year);
      const goodFriday = new Date(easterSunday);
      goodFriday.setDate(easterSunday.getDate() - 2);

      const easterSaturday = new Date(easterSunday);
      easterSaturday.setDate(easterSunday.getDate() - 1);

      const easterMonday = new Date(easterSunday);
      easterMonday.setDate(easterSunday.getDate() + 1);

      addHoliday(holidays, goodFriday, "Good Friday");
      addHoliday(holidays, easterSaturday, "Easter Saturday");
      addHoliday(holidays, easterSunday, "Easter Sunday");
      addHoliday(holidays, easterMonday, "Easter Monday");

      addHoliday(holidays, new Date(year, 3, 25), "Anzac Day");
      addHoliday(holidays, nthWeekdayOfMonth(year, 5, 1, 2), "King's Birthday");
      addHoliday(holidays, nthWeekdayOfMonth(year, 9, 1, 1), "Labour Day");

      const christmas = new Date(year, 11, 25);
      const boxingDay = new Date(year, 11, 26);

      if (christmas.getDay() === 6) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, new Date(year, 11, 27), "Additional Day");
        addHoliday(holidays, new Date(year, 11, 28), "Boxing Day");
      } else if (christmas.getDay() === 0) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, new Date(year, 11, 26), "Additional Day");
        addHoliday(holidays, new Date(year, 11, 27), "Boxing Day");
      } else if (boxingDay.getDay() === 6) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, boxingDay, "Boxing Day");
        addHoliday(holidays, new Date(year, 11, 28), "Additional Day");
      } else if (boxingDay.getDay() === 0) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, boxingDay, "Boxing Day");
        addHoliday(holidays, new Date(year, 11, 28), "Additional Day");
      } else {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, boxingDay, "Boxing Day");
      }

      return holidays;
    }

    function getMonthSurvivalTip(monthIndex) {
      const tips = [
        "Survive January: hydrate and lower expectations.",
        "Survive February: it’s short, thank God.",
        "Survive March: admin begins its annual attack.",
        "Survive April: Easter chocolate and strategic disappearing.",
        "Survive May: Mother's Day and emotional paperwork.",
        "Survive June: long weekend, cold toes, keep moving.",
        "Survive July: school holidays and soup-based survival.",
        "Survive August: this month is basically stubbornness.",
        "Survive September: spring optimism with hidden admin.",
        "Survive October: Labour Day, then chaos resumes.",
        "Survive November: too many things, not enough soul.",
        "Survive December: festive sparkle, logistical violence."
      ];
      return tips[monthIndex];
    }

    function getDayValue(year, monthIndex, day, savedData, holidays) {
      const dateKey = formatDateKey(year, monthIndex, day);
      const holidayText = holidays[dateKey] || "";
      return savedData[dateKey] !== undefined ? savedData[dateKey] : holidayText;
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.max(el.scrollHeight, 24) + "px";
    }

    function wrapText(doc, text, maxWidth) {
      return doc.splitTextToSize(String(text || ""), maxWidth);
    }

    function drawTextLines(doc, lines, x, y, lineHeight, maxLines, align = "left") {
      const trimmed = lines.slice(0, maxLines);
      trimmed.forEach((line, i) => {
        if (align === "center") {
          doc.text(line, x, y + i * lineHeight, { align: "center" });
        } else {
          doc.text(line, x, y + i * lineHeight);
        }
      });
    }

    function buildScreenYearGrid() {
      const year = Number(yearInput.value);
      const savedData = loadData(year);
      const holidays = getNswPublicHolidays(year);
      const themeMonths = currentThemeMonths();

      yearGrid.innerHTML = "";

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        const monthEl = document.createElement("div");
        monthEl.className = `month-column`;

        const header = document.createElement("div");
        header.className = "month-header";
        header.style.background = `rgb(${themeMonths[monthIndex][0]}, ${themeMonths[monthIndex][1]}, ${themeMonths[monthIndex][2]})`;
        header.innerHTML = `
          <h2 class="month-title">${monthNames[monthIndex]}</h2>
          <div class="month-tip">${getMonthSurvivalTip(monthIndex)}</div>
        `;

        const table = document.createElement("table");
        const tbody = document.createElement("tbody");
        const daysInMonth = getDaysInMonth(year, monthIndex);

        for (let day = 1; day <= daysInMonth; day++) {
          const tr = document.createElement("tr");
          const dateKey = formatDateKey(year, monthIndex, day);
          const weekday = getDayOfWeek(year, monthIndex, day);
          const holidayText = holidays[dateKey] || "";
          const value = getDayValue(year, monthIndex, day, savedData, holidays);

          if (holidayText) tr.classList.add("holiday-row");

          const dayTd = document.createElement("td");
          dayTd.className = "day-num" + ((weekday === 0 || weekday === 6) ? " weekend" : "");
          dayTd.textContent = day;

          const eventTd = document.createElement("td");
          eventTd.className = "event-cell";

          const textarea = document.createElement("textarea");
          textarea.className = "day-input";
          textarea.dataset.date = dateKey;
          textarea.value = value;
          textarea.spellcheck = false;

          textarea.addEventListener("input", () => {
            autoResize(textarea);
            saveCurrentYear();
          });

          eventTd.appendChild(textarea);
          tr.appendChild(dayTd);
          tr.appendChild(eventTd);
          tbody.appendChild(tr);

          requestAnimationFrame(() => autoResize(textarea));
        }

        table.appendChild(tbody);
        monthEl.appendChild(header);
        monthEl.appendChild(table);
        yearGrid.appendChild(monthEl);
      }
    }

    function saveCurrentYear() {
      const year = Number(yearInput.value);
      const data = {};
      document.querySelectorAll("#yearGrid textarea.day-input").forEach(input => {
        if (input.value.trim() !== "") {
          data[input.dataset.date] = input.value.trim();
        }
      });
      saveData(year, data);
    }

    function clearYear() {
      const year = Number(yearInput.value);
      const ok = confirm(`Clear everything for ${year}?`);
      if (!ok) return;
      localStorage.removeItem(storageKey(year));
      buildScreenYearGrid();
      showStatus(`Cleared ${year}. A brutal reset.`);
    }

    function exportCSV() {
      const year = Number(yearInput.value);
      const data = loadData(year);
      let csv = "Date,Month,Day,Event\n";

      monthNames.forEach((monthName, monthIndex) => {
        const daysInMonth = getDaysInMonth(year, monthIndex);
        for (let day = 1; day <= daysInMonth; day++) {
          const key = formatDateKey(year, monthIndex, day);
          const value = (data[key] || "").replace(/"/g, '""').replace(/\n/g, " | ");
          csv += `"${key}","${monthName}","${day}","${value}"\n`;
        }
      });

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `year-at-a-glance-${year}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      showStatus("CSV downloaded.");
    }

    function makePdf() {
      const size = paperSizeEl.value;
      const orientation = orientationEl.value;
      return new jsPDF({ orientation, unit: "mm", format: size, compress: true });
    }

    function getMonthsPerPage(scaleValue, mode) {
      if (mode === "month") return 1;
      if (scaleValue >= 500) return 3;
      if (scaleValue >= 150) return 6;
      return 12;
    }

    function drawYearMonthsPage(doc, year, savedData, holidays, startMonth, monthsPerPage, pageIndex, totalPages) {
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const themeMonths = currentThemeMonths();

      const margin = 4;
      const headerY = margin + 4;
      const contentTop = margin + 8 + 2;
      const contentH = pageH - contentTop - margin;
      const gap = 1;

      const monthW = (pageW - margin * 2 - gap * (monthsPerPage - 1)) / monthsPerPage;
      const monthH = contentH;

      const headerBoxH = 6.6;
      const rowH = (monthH - headerBoxH) / 31;
      const dayColW = 5.8;
      const textW = monthW - dayColW - 0.8;

      doc.setFont("helvetica", "bold");
      doc.setFontSize(12);
      doc.setTextColor(47, 42, 51);

      const headerText = totalPages > 1
        ? `Year at a Glance ${year} — Page ${pageIndex + 1} of ${totalPages}`
        : `Year at a Glance ${year}`;

      doc.text(headerText, margin, headerY);

      for (let slot = 0; slot < monthsPerPage; slot++) {
        const monthIndex = startMonth + slot;
        if (monthIndex > 11) break;

        const x = margin + slot * (monthW + gap);
        const y = contentTop;
        const color = themeMonths[monthIndex];

        doc.setDrawColor(231, 223, 234);
        doc.setFillColor(255, 255, 255);
        doc.roundedRect(x, y, monthW, monthH, 2, 2, "S");

        doc.setFillColor(color[0], color[1], color[2]);
        doc.rect(x, y, monthW, headerBoxH, "F");

        doc.setFont("helvetica", "bold");
        doc.setFontSize(9.5);
        doc.setTextColor(47, 42, 51);
        doc.text(monthNames[monthIndex], x + monthW / 2, y + 4.2, { align: "center" });

        const daysInMonth = getDaysInMonth(year, monthIndex);

        for (let day = 1; day <= 31; day++) {
          const rowY = y + headerBoxH + (day - 1) * rowH;

          doc.setDrawColor(238, 230, 240);
          doc.line(x, rowY, x + monthW, rowY);

          if (day <= daysInMonth) {
            const weekday = getDayOfWeek(year, monthIndex, day);
            const value = getDayValue(year, monthIndex, day, savedData, holidays);

            doc.setDrawColor(238, 230, 240);
            doc.line(x + dayColW, rowY, x + dayColW, rowY + rowH);

            doc.setFont("helvetica", weekday === 0 || weekday === 6 ? "bold" : "normal");
            doc.setFontSize(7.2);
            if (weekday === 0 || weekday === 6) {
              doc.setTextColor(217, 74, 87);
            } else {
              doc.setTextColor(61, 55, 66);
            }
            doc.text(String(day), x + 0.9, rowY + rowH * 0.73);

            doc.setTextColor(47, 42, 51);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(6.8);

            const lines = wrapText(doc, value, textW);
            drawTextLines(doc, lines, x + dayColW + 0.35, rowY + rowH * 0.73, 2.15, 2, "left");
          }
        }

        doc.line(x, y + monthH, x + monthW, y + monthH);
      }
    }

    function drawYearPdf(doc, year, savedData, holidays) {
      const scaleValue = Number(pdfScaleEl.value);
      const monthsPerPage = getMonthsPerPage(scaleValue, "year");
      const totalPages = Math.ceil(12 / monthsPerPage);

      for (let pageIndex = 0; pageIndex < totalPages; pageIndex++) {
        if (pageIndex > 0) doc.addPage();
        drawYearMonthsPage(
          doc,
          year,
          savedData,
          holidays,
          pageIndex * monthsPerPage,
          monthsPerPage,
          pageIndex,
          totalPages
        );
      }
    }

    function drawMonthPdf(doc, year, monthIndex, savedData, holidays) {
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const margin = 4;
      const color = currentThemeMonths()[monthIndex];
      const scaleValue = Number(pdfScaleEl.value);

      let monthFont = 18;
      let weekdayFont = 12;
      let dayNumberFont = 12;
      let eventFont = 12;
      let lineHeight = 4.6;

      if (scaleValue >= 500) {
        monthFont = 24;
        weekdayFont = 14;
        dayNumberFont = 16;
        eventFont = 16;
        lineHeight = 5.8;
      } else if (scaleValue >= 150) {
        monthFont = 21;
        weekdayFont = 13;
        dayNumberFont = 14;
        eventFont = 14;
        lineHeight = 5.0;
      }

      const headerH = 24;
      const weekdayH = 10;
      const calTop = margin + headerH + weekdayH;
      const calH = pageH - calTop - margin;
      const calW = pageW - margin * 2;
      const cellW = calW / 7;

      const firstDay = getFirstDayOfMonth(year, monthIndex);
      const daysInMonth = getDaysInMonth(year, monthIndex);
      const rows = Math.ceil((firstDay + daysInMonth) / 7);
      const cellH = calH / rows;

      doc.setFillColor(color[0], color[1], color[2]);
      doc.rect(margin, margin, calW, headerH, "F");

      doc.setFont("helvetica", "bold");
      doc.setFontSize(monthFont);
      doc.setTextColor(47, 42, 51);
      doc.text(`${monthNames[monthIndex]} ${year}`, pageW / 2, margin + 8, { align: "center" });

      doc.setFont("helvetica", "normal");
      doc.setFontSize(9);
      doc.setTextColor(91, 83, 96);
      doc.text(getMonthSurvivalTip(monthIndex), pageW / 2, margin + 15, { align: "center" });

      doc.setDrawColor(234, 223, 238);
      for (let i = 0; i < 7; i++) {
        const x = margin + i * cellW;
        doc.rect(x, margin + headerH, cellW, weekdayH);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(weekdayFont);
        doc.setTextColor(47, 42, 51);
        doc.text(weekdayNamesShort[i], x + cellW / 2, margin + headerH + 6.5, { align: "center" });
      }

      let currentDay = 1;
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < 7; col++) {
          const index = row * 7 + col;
          const x = margin + col * cellW;
          const y = calTop + row * cellH;

          doc.setDrawColor(234, 223, 238);
          doc.rect(x, y, cellW, cellH);

          if (index < firstDay || currentDay > daysInMonth) {
            doc.setFillColor(251, 249, 252);
            doc.rect(x, y, cellW, cellH, "F");
            doc.setDrawColor(234, 223, 238);
            doc.rect(x, y, cellW, cellH);
            continue;
          }

          const weekday = getDayOfWeek(year, monthIndex, currentDay);
          const value = getDayValue(year, monthIndex, currentDay, savedData, holidays);

          doc.setFont("helvetica", "bold");
          doc.setFontSize(dayNumberFont);
          if (weekday === 0 || weekday === 6) {
            doc.setTextColor(217, 74, 87);
          } else {
            doc.setTextColor(61, 55, 66);
          }
          doc.text(String(currentDay), x + 2, y + 6);

          doc.setFont("helvetica", "normal");
          doc.setFontSize(eventFont);
          doc.setTextColor(47, 42, 51);
          const lines = wrapText(doc, value, cellW - 4);
          drawTextLines(
            doc,
            lines,
            x + 2,
            y + 12,
            lineHeight,
            Math.max(1, Math.floor((cellH - 15) / lineHeight)),
            "left"
          );

          currentDay++;
        }
      }
    }

    function openPdf(doc, filenameBase) {
      const blobUrl = doc.output("bloburl");
      window.open(blobUrl, "_blank");
      showStatus(`${filenameBase}.pdf opened. Print from the PDF viewer.`);
    }

    function createPdf() {
      saveCurrentYear();

      const year = Number(yearInput.value);
      const savedData = loadData(year);
      const holidays = getNswPublicHolidays(year);
      const doc = makePdf();

      if (printModeEl.value === "month") {
        const monthIndex = Number(printMonthEl.value || 0);
        drawMonthPdf(doc, year, monthIndex, savedData, holidays);
        openPdf(doc, `${monthNames[monthIndex].toLowerCase()}-${year}`);
      } else {
        drawYearPdf(doc, year, savedData, holidays);
        openPdf(doc, `year-at-a-glance-${year}`);
      }
    }

    function buildAllViews() {
      buildScreenYearGrid();
      showStatus(`Loaded ${yearInput.value}. NSW public holidays are included.`);
    }

    document.getElementById("generateBtn").addEventListener("click", buildAllViews);

    document.getElementById("saveBtn").addEventListener("click", () => {
      saveCurrentYear();
      showStatus("Saved to this browser.");
    });

    document.getElementById("pdfBtn").addEventListener("click", createPdf);
    document.getElementById("csvBtn").addEventListener("click", exportCSV);
    document.getElementById("clearBtn").addEventListener("click", clearYear);

    yearInput.addEventListener("change", buildAllViews);
    themeSelect.addEventListener("change", buildAllViews);

    printModeEl.addEventListener("change", () => {
      printMonthEl.disabled = printModeEl.value !== "month";
    });

    printMonthEl.disabled = true;

    buildAllViews();
  </script>
</body>
</html>
