<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastel Rainbow Year-at-a-Glance Planner</title>
  <style>
    :root {
      --bg: #faf7fb;
      --card: #ffffff;
      --ink: #2f2a33;
      --muted: #746c78;
      --line: #e7dfea;
      --shadow: 0 10px 30px rgba(87, 66, 100, 0.08);
      --font: Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, #fff2f7 0%, transparent 28%),
        radial-gradient(circle at top right, #eef7ff 0%, transparent 28%),
        var(--bg);
      color: var(--ink);
    }

    body { min-height: 100vh; }

    .app {
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
      position: sticky;
      top: 10px;
      z-index: 20;
      backdrop-filter: blur(10px);
    }

    .topbar h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2.6vw, 2.2rem);
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .controls {
      display: grid;
      grid-template-columns: 110px 120px 140px 170px 170px repeat(5, minmax(110px, 1fr));
      gap: 10px;
      margin-top: 16px;
      align-items: end;
    }

    .field {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: bold;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button, textarea {
      font: inherit;
    }

    input[type="number"], select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 11px 12px;
      font-weight: bold;
      cursor: pointer;
      background: #f1e8f7;
      color: var(--ink);
      box-shadow: 0 4px 10px rgba(87, 66, 100, 0.08);
      transition: transform 0.12s ease, background 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: #e9dbf4;
    }

    .primary {
      background: #dff4e6;
    }

    .primary:hover {
      background: #d1eedc;
    }

    .danger {
      background: #ffe6eb;
    }

    .danger:hover {
      background: #ffd8e1;
    }

    .status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .planner-wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: auto;
      padding: 14px;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(180px, 1fr));
      gap: 10px;
      min-width: 2200px;
    }

    .month-column {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .month-header {
      padding: 10px 10px 8px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .month-title {
      margin: 0;
      text-align: center;
      font-size: 0.95rem;
      font-weight: bold;
    }

    .month-tip {
      margin: 5px 0 0;
      font-size: 0.68rem;
      text-align: center;
      color: #524b58;
      line-height: 1.25;
      min-height: 34px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td {
      border-bottom: 1px solid #eee6f0;
      vertical-align: top;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .day-num {
      width: 28px;
      min-width: 28px;
      text-align: center;
      font-size: 0.75rem;
      padding: 6px 4px;
      color: #3d3742;
      border-right: 1px solid #eee6f0;
      background: rgba(255,255,255,0.55);
    }

    .day-num.weekend {
      color: #d94a57;
      font-weight: bold;
    }

    .event-cell {
      padding: 0;
    }

    textarea.day-input {
      width: 100%;
      min-height: 26px;
      border: none;
      resize: none;
      padding: 6px 7px;
      background: transparent;
      color: var(--ink);
      font-size: 0.72rem;
      line-height: 1.2;
      outline: none;
      overflow: hidden;
    }

    .holiday-row .day-input {
      font-weight: 600;
    }

    .month-0  .month-header { background: #ffd9e5; }
    .month-1  .month-header { background: #ffe7cf; }
    .month-2  .month-header { background: #fff4c7; }
    .month-3  .month-header { background: #e3f5d5; }
    .month-4  .month-header { background: #d8f4df; }
    .month-5  .month-header { background: #d9f4f1; }
    .month-6  .month-header { background: #ddeeff; }
    .month-7  .month-header { background: #e5e2ff; }
    .month-8  .month-header { background: #efe1ff; }
    .month-9  .month-header { background: #ffe2f4; }
    .month-10 .month-header { background: #eee7f7; }
    .month-11 .month-header { background: #ffdce7; }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 12px 4px 0;
    }

    .hidden-measure {
      position: absolute;
      left: -99999px;
      top: -99999px;
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 1200px) {
      .controls {
        grid-template-columns: repeat(2, 1fr);
      }

      .topbar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="topbar">
      <h1>Pastel Rainbow Year-at-a-Glance Planner</h1>
      <p>
        Fill your whole year, print it with colours, and export it to Excel. Still a spreadsheet at heart, obviously.
        Just wearing a cardigan now.
      </p>

      <div class="controls">
        <div class="field">
          <label for="yearInput">Year</label>
          <input id="yearInput" type="number" min="2020" max="2035" />
        </div>

        <div class="field">
          <label for="paperSize">Print size</label>
          <select id="paperSize">
            <option value="A4">A4</option>
            <option value="A3" selected>A3</option>
          </select>
        </div>

        <div class="field">
          <label for="orientation">Orientation</label>
          <select id="orientation">
            <option value="landscape" selected>Landscape</option>
            <option value="portrait">Portrait</option>
          </select>
        </div>

        <div class="field">
          <label for="printMode">Print what</label>
          <select id="printMode">
            <option value="year" selected>Entire year</option>
            <option value="month">One month only</option>
          </select>
        </div>

        <div class="field">
          <label for="printMonth">Month to print</label>
          <select id="printMonth"></select>
        </div>

        <button class="primary" id="generateBtn">Generate / Refresh</button>
        <button id="saveBtn">Save to browser</button>
        <button id="printBtn">Print</button>
        <button id="csvBtn">Download CSV</button>
        <button class="danger" id="clearBtn">Clear this year</button>
      </div>

      <div class="status" id="status"></div>
    </section>

    <section class="planner-wrap">
      <div class="year-grid" id="yearGrid"></div>
    </section>

    <div class="footer-note">
      Blank days stay blank. Which is frankly the most emotionally mature feature here.
    </div>
  </div>

  <iframe id="printFrame" style="position:absolute; width:0; height:0; border:0; left:-9999px; top:-9999px;"></iframe>
  <div id="measureBox" class="hidden-measure"></div>

  <script>
    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    const weekdayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

    const monthColours = [
      "#ffd9e5", "#ffe7cf", "#fff4c7", "#e3f5d5",
      "#d8f4df", "#d9f4f1", "#ddeeff", "#e5e2ff",
      "#efe1ff", "#ffe2f4", "#eee7f7", "#ffdce7"
    ];

    const yearInput = document.getElementById("yearInput");
    const yearGrid = document.getElementById("yearGrid");
    const statusEl = document.getElementById("status");
    const paperSizeEl = document.getElementById("paperSize");
    const orientationEl = document.getElementById("orientation");
    const printModeEl = document.getElementById("printMode");
    const printMonthEl = document.getElementById("printMonth");
    const printFrame = document.getElementById("printFrame");
    const measureBox = document.getElementById("measureBox");

    yearInput.value = new Date().getFullYear();

    monthNames.forEach((month, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = month;
      printMonthEl.appendChild(option);
    });

    function storageKey(year) {
      return `year-at-a-glance-${year}`;
    }

    function showStatus(message) {
      statusEl.textContent = message;
      clearTimeout(showStatus.timer);
      showStatus.timer = setTimeout(() => {
        statusEl.textContent = "";
      }, 3000);
    }

    function loadData(year) {
      const raw = localStorage.getItem(storageKey(year));
      return raw ? JSON.parse(raw) : {};
    }

    function saveData(year, data) {
      localStorage.setItem(storageKey(year), JSON.stringify(data));
    }

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function formatDateKey(year, month, day) {
      return `${year}-${pad(month + 1)}-${pad(day)}`;
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function getDayOfWeek(year, month, day) {
      return new Date(year, month, day).getDay();
    }

    function getFirstDayOfMonth(year, month) {
      return new Date(year, month, 1).getDay();
    }

    function getEasterSunday(year) {
      const a = year % 19;
      const b = Math.floor(year / 100);
      const c = year % 100;
      const d = Math.floor(b / 4);
      const e = b % 4;
      const f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3);
      const h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4);
      const k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
      const day = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(year, month, day);
    }

    function nthWeekdayOfMonth(year, month, weekday, nth) {
      let count = 0;
      for (let day = 1; day <= 31; day++) {
        const date = new Date(year, month, day);
        if (date.getMonth() !== month) break;
        if (date.getDay() === weekday) {
          count++;
          if (count === nth) return date;
        }
      }
      return null;
    }

    function observedIfWeekend(date) {
      const day = date.getDay();
      if (day === 6) return new Date(date.getFullYear(), date.getMonth(), date.getDate() + 2);
      if (day === 0) return new Date(date.getFullYear(), date.getMonth(), date.getDate() + 1);
      return date;
    }

    function addHoliday(map, date, name) {
      const key = formatDateKey(date.getFullYear(), date.getMonth(), date.getDate());
      map[key] = name;
    }

    function getNswPublicHolidays(year) {
      const holidays = {};

      addHoliday(holidays, new Date(year, 0, 1), "New Year's Day");

      const australiaDayActual = new Date(year, 0, 26);
      addHoliday(holidays, observedIfWeekend(australiaDayActual), "Australia Day");

      const easterSunday = getEasterSunday(year);
      const goodFriday = new Date(easterSunday);
      goodFriday.setDate(easterSunday.getDate() - 2);

      const easterSaturday = new Date(easterSunday);
      easterSaturday.setDate(easterSunday.getDate() - 1);

      const easterMonday = new Date(easterSunday);
      easterMonday.setDate(easterSunday.getDate() + 1);

      addHoliday(holidays, goodFriday, "Good Friday");
      addHoliday(holidays, easterSaturday, "Easter Saturday");
      addHoliday(holidays, easterSunday, "Easter Sunday");
      addHoliday(holidays, easterMonday, "Easter Monday");

      addHoliday(holidays, new Date(year, 3, 25), "Anzac Day");
      addHoliday(holidays, nthWeekdayOfMonth(year, 5, 1, 2), "King's Birthday");
      addHoliday(holidays, nthWeekdayOfMonth(year, 9, 1, 1), "Labour Day");

      const christmas = new Date(year, 11, 25);
      const boxingDay = new Date(year, 11, 26);

      if (christmas.getDay() === 6) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, new Date(year, 11, 27), "Additional Day");
        addHoliday(holidays, new Date(year, 11, 28), "Boxing Day");
      } else if (christmas.getDay() === 0) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, new Date(year, 11, 26), "Additional Day");
        addHoliday(holidays, new Date(year, 11, 27), "Boxing Day");
      } else if (boxingDay.getDay() === 6) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, boxingDay, "Boxing Day");
        addHoliday(holidays, new Date(year, 11, 28), "Additional Day");
      } else if (boxingDay.getDay() === 0) {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, boxingDay, "Boxing Day");
        addHoliday(holidays, new Date(year, 11, 28), "Additional Day");
      } else {
        addHoliday(holidays, christmas, "Christmas Day");
        addHoliday(holidays, boxingDay, "Boxing Day");
      }

      return holidays;
    }

    function getMonthSurvivalTip(monthIndex) {
      const tips = [
        "Survive January: hydrate and lower expectations.",
        "Survive February: it’s short, thank God.",
        "Survive March: admin begins its annual attack.",
        "Survive April: Easter chocolate and strategic disappearing.",
        "Survive May: Mother's Day and emotional paperwork.",
        "Survive June: long weekend, cold toes, keep moving.",
        "Survive July: school holidays and soup-based survival.",
        "Survive August: this month is basically stubbornness.",
        "Survive September: spring optimism with hidden admin.",
        "Survive October: Labour Day, then chaos resumes.",
        "Survive November: too many things, not enough soul.",
        "Survive December: festive sparkle, logistical violence."
      ];
      return tips[monthIndex];
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getDayValue(year, monthIndex, day, savedData, holidays) {
      const dateKey = formatDateKey(year, monthIndex, day);
      const holidayText = holidays[dateKey] || "";
      return savedData[dateKey] !== undefined ? savedData[dateKey] : holidayText;
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.max(el.scrollHeight, 24) + "px";
    }

    function buildScreenYearGrid() {
      const year = Number(yearInput.value);
      const savedData = loadData(year);
      const holidays = getNswPublicHolidays(year);

      yearGrid.innerHTML = "";

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        const monthEl = document.createElement("div");
        monthEl.className = `month-column month-${monthIndex}`;

        const header = document.createElement("div");
        header.className = "month-header";
        header.innerHTML = `
          <h2 class="month-title">${monthNames[monthIndex]}</h2>
          <div class="month-tip">${getMonthSurvivalTip(monthIndex)}</div>
        `;

        const table = document.createElement("table");
        const tbody = document.createElement("tbody");
        const daysInMonth = getDaysInMonth(year, monthIndex);

        for (let day = 1; day <= daysInMonth; day++) {
          const tr = document.createElement("tr");
          const dateKey = formatDateKey(year, monthIndex, day);
          const weekday = getDayOfWeek(year, monthIndex, day);
          const holidayText = holidays[dateKey] || "";
          const value = getDayValue(year, monthIndex, day, savedData, holidays);

          if (holidayText) tr.classList.add("holiday-row");

          const dayTd = document.createElement("td");
          dayTd.className = "day-num" + ((weekday === 0 || weekday === 6) ? " weekend" : "");
          dayTd.textContent = day;

          const eventTd = document.createElement("td");
          eventTd.className = "event-cell";

          const textarea = document.createElement("textarea");
          textarea.className = "day-input";
          textarea.dataset.date = dateKey;
          textarea.value = value;
          textarea.spellcheck = false;

          textarea.addEventListener("input", () => {
            autoResize(textarea);
            saveCurrentYear();
          });

          eventTd.appendChild(textarea);
          tr.appendChild(dayTd);
          tr.appendChild(eventTd);
          tbody.appendChild(tr);

          requestAnimationFrame(() => autoResize(textarea));
        }

        table.appendChild(tbody);
        monthEl.appendChild(header);
        monthEl.appendChild(table);
        yearGrid.appendChild(monthEl);
      }
    }

    function saveCurrentYear() {
      const year = Number(yearInput.value);
      const data = {};
      document.querySelectorAll("#yearGrid textarea.day-input").forEach(input => {
        if (input.value.trim() !== "") {
          data[input.dataset.date] = input.value.trim();
        }
      });
      saveData(year, data);
    }

    function clearYear() {
      const year = Number(yearInput.value);
      const ok = confirm(`Clear everything for ${year}?`);
      if (!ok) return;
      localStorage.removeItem(storageKey(year));
      buildScreenYearGrid();
      showStatus(`Cleared ${year}. A brutal reset.`);
    }

    function exportCSV() {
      const year = Number(yearInput.value);
      const data = loadData(year);
      let csv = "Date,Month,Day,Event\n";

      monthNames.forEach((monthName, monthIndex) => {
        const daysInMonth = getDaysInMonth(year, monthIndex);
        for (let day = 1; day <= daysInMonth; day++) {
          const key = formatDateKey(year, monthIndex, day);
          const value = (data[key] || "").replace(/"/g, '""').replace(/\n/g, " | ");
          csv += `"${key}","${monthName}","${day}","${value}"\n`;
        }
      });

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `year-at-a-glance-${year}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      showStatus("CSV downloaded.");
    }

    function buildYearGridMarkup(year, savedData, holidays) {
      let monthsMarkup = "";

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        let rows = "";
        const daysInMonth = getDaysInMonth(year, monthIndex);

        for (let day = 1; day <= daysInMonth; day++) {
          const weekday = getDayOfWeek(year, monthIndex, day);
          const value = escapeHtml(getDayValue(year, monthIndex, day, savedData, holidays));

          rows += '<tr>' +
            '<td class="day-num ' + ((weekday === 0 || weekday === 6) ? 'weekend' : '') + '">' + day + '</td>' +
            '<td class="event-cell"><div class="day-input">' + value + '</div></td>' +
            '</tr>';
        }

        monthsMarkup += '<div class="month-column">' +
          '<div class="month-header" style="background:' + monthColours[monthIndex] + '">' +
          '<div class="month-title">' + monthNames[monthIndex] + '</div>' +
          '<div class="month-tip">' + escapeHtml(getMonthSurvivalTip(monthIndex)) + '</div>' +
          '</div>' +
          '<table><tbody>' + rows + '</tbody></table>' +
          '</div>';
      }

      return monthsMarkup;
    }

    function buildMeasureStyles() {
      return '' +
        '.year-grid{display:grid;grid-template-columns:repeat(12,minmax(180px,1fr));gap:4px;}' +
        '.month-column{border:1px solid #e7dfea;border-radius:12px;overflow:hidden;background:#fff;}' +
        '.month-header{padding:4px 4px 3px;border-bottom:1px solid rgba(0,0,0,0.04);}' +
        '.month-title{text-align:center;font-size:7pt;font-weight:bold;margin:0;}' +
        '.month-tip{margin-top:3px;font-size:4.8pt;text-align:center;color:#524b58;line-height:1.1;}' +
        'table{width:100%;border-collapse:collapse;table-layout:fixed;}' +
        'td{border-bottom:1px solid #eee6f0;vertical-align:top;}' +
        'tr:last-child td{border-bottom:none;}' +
        '.day-num{width:18px;min-width:18px;text-align:center;font-size:6pt;padding:2px 1px;color:#3d3742;border-right:1px solid #eee6f0;background:rgba(255,255,255,0.55);}' +
        '.day-num.weekend{color:#d94a57;font-weight:bold;}' +
        '.day-input{min-height:14px;padding:3px 4px;font-size:6pt;line-height:1.05;white-space:pre-wrap;color:#2f2a33;}';
    }

    function getPaperDimensionsMm(size, orientation) {
      if (size === "A4" && orientation === "portrait") return { width: 210, height: 297 };
      if (size === "A4" && orientation === "landscape") return { width: 297, height: 210 };
      if (size === "A3" && orientation === "portrait") return { width: 297, height: 420 };
      return { width: 420, height: 297 };
    }

    function measureYearScale(year, savedData, holidays, size, orientation) {
      const paper = getPaperDimensionsMm(size, orientation);
      const usableWidthPx = ((paper.width - 8) / 25.4) * 96;
      const usableHeightPx = ((paper.height - 18) / 25.4) * 96;

      measureBox.innerHTML = '<style>' + buildMeasureStyles() + '</style><div class="year-grid" id="measureGrid">' + buildYearGridMarkup(year, savedData, holidays) + '</div>';
      const grid = measureBox.querySelector("#measureGrid");

      const gridWidth = grid.scrollWidth;
      const gridHeight = grid.scrollHeight;

      const scaleX = usableWidthPx / gridWidth;
      const scaleY = usableHeightPx / gridHeight;
      const scale = Math.min(scaleX, scaleY, 0.96);

      measureBox.innerHTML = "";
      return scale;
    }

    function getYearPrintDocument(year, savedData, holidays, size, orientation) {
      const gridMarkup = buildYearGridMarkup(year, savedData, holidays);
      const scale = measureYearScale(year, savedData, holidays, size, orientation);

      return [
        '<!DOCTYPE html>',
        '<html lang="en">',
        '<head>',
        '<meta charset="UTF-8">',
        '<title>Year Print</title>',
        '<style>',
        '@page { size: ' + size + ' ' + orientation + '; margin: 4mm; }',
        'html, body { margin:0; padding:0; width:100%; height:100%; background:#fff; font-family:Arial, Helvetica, sans-serif; -webkit-print-color-adjust:exact; print-color-adjust:exact; overflow:hidden; }',
        '* { box-sizing:border-box; }',
        '.page { width:100%; height:100%; padding:4mm; display:flex; flex-direction:column; }',
        '.header { font-size:14pt; font-weight:700; color:#2f2a33; margin-bottom:4mm; text-align:left; flex:0 0 auto; }',
        '.content { flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }',
        '.scale-box { transform-origin:center center; transform:scale(' + scale + '); }',
        buildMeasureStyles(),
        '</style>',
        '</head>',
        '<body>',
        '<div class="page">',
        '<div class="header">Year at a Glance ' + year + '</div>',
        '<div class="content"><div class="scale-box"><div class="year-grid">' + gridMarkup + '</div></div></div>',
        '</div>',
        '</body>',
        '</html>'
      ].join("");
    }

    function getMonthPrintDocument(year, monthIndex, savedData, holidays, size, orientation) {
      const firstDay = getFirstDayOfMonth(year, monthIndex);
      const daysInMonth = getDaysInMonth(year, monthIndex);
      const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

      let weekdayMarkup = "";
      weekdayNames.forEach(day => {
        weekdayMarkup += '<div class="weekday">' + day + '</div>';
      });

      let cellsMarkup = "";
      for (let i = 0; i < totalCells; i++) {
        if (i < firstDay || i >= firstDay + daysInMonth) {
          cellsMarkup += '<div class="day empty"></div>';
          continue;
        }

        const day = i - firstDay + 1;
        const weekday = getDayOfWeek(year, monthIndex, day);
        const value = escapeHtml(getDayValue(year, monthIndex, day, savedData, holidays));

        cellsMarkup += '<div class="day">' +
          '<div class="day-number ' + ((weekday === 0 || weekday === 6) ? 'weekend' : '') + '">' + day + '</div>' +
          '<div class="day-events">' + value + '</div>' +
          '</div>';
      }

      return [
        '<!DOCTYPE html>',
        '<html lang="en">',
        '<head>',
        '<meta charset="UTF-8">',
        '<title>Month Print</title>',
        '<style>',
        '@page { size: ' + size + ' ' + orientation + '; margin: 4mm; }',
        'html, body { margin:0; padding:0; width:100%; height:100%; background:#fff; font-family:Arial, Helvetica, sans-serif; -webkit-print-color-adjust:exact; print-color-adjust:exact; overflow:hidden; }',
        '* { box-sizing:border-box; }',
        '.page { width:100%; height:100%; display:flex; flex-direction:column; }',
        '.header { background:' + monthColours[monthIndex] + '; padding:10mm 8mm 6mm; border-bottom:1px solid rgba(0,0,0,0.08); flex:0 0 auto; }',
        '.header h1 { margin:0; text-align:center; font-size:22pt; color:#2f2a33; }',
        '.tip { margin-top:4mm; text-align:center; font-size:10pt; color:#5b5360; }',
        '.weekday-row { display:grid; grid-template-columns:repeat(7, 1fr); flex:0 0 auto; }',
        '.weekday { padding:3mm 2mm; text-align:center; font-weight:bold; font-size:10pt; border-right:1px solid #eadfee; border-bottom:1px solid #eadfee; background:rgba(255,255,255,0.7); }',
        '.weekday:nth-child(7) { border-right:none; }',
        '.calendar { flex:1 1 auto; min-height:0; display:grid; grid-template-columns:repeat(7, 1fr); grid-auto-rows:1fr; }',
        '.day { border-right:1px solid #eadfee; border-bottom:1px solid #eadfee; padding:2.5mm; display:flex; flex-direction:column; gap:4px; min-height:0; }',
        '.day:nth-child(7n) { border-right:none; }',
        '.day.empty { background:#fbf9fc; }',
        '.day-number { font-size:10pt; font-weight:bold; color:#3d3742; }',
        '.day-number.weekend { color:#d94a57; }',
        '.day-events { font-size:8.5pt; line-height:1.25; white-space:pre-wrap; color:#2f2a33; }',
        '</style>',
        '</head>',
        '<body>',
        '<div class="page">',
        '<div class="header"><h1>' + monthNames[monthIndex] + ' ' + year + '</h1><div class="tip">' + escapeHtml(getMonthSurvivalTip(monthIndex)) + '</div></div>',
        '<div class="weekday-row">' + weekdayMarkup + '</div>',
        '<div class="calendar">' + cellsMarkup + '</div>',
        '</div>',
        '</body>',
        '</html>'
      ].join("");
    }

    function printHtmlInFrame(html) {
      const frameDoc = printFrame.contentWindow.document;
      frameDoc.open();
      frameDoc.write(html);
      frameDoc.close();

      setTimeout(() => {
        printFrame.contentWindow.focus();
        printFrame.contentWindow.print();
      }, 500);
    }

    function printPlanner() {
      saveCurrentYear();

      const year = Number(yearInput.value);
      const savedData = loadData(year);
      const holidays = getNswPublicHolidays(year);
      const size = paperSizeEl.value;
      const orientation = orientationEl.value;

      if (printModeEl.value === "month") {
        const monthIndex = Number(printMonthEl.value || 0);
        const html = getMonthPrintDocument(year, monthIndex, savedData, holidays, size, orientation);
        printHtmlInFrame(html);
      } else {
        const html = getYearPrintDocument(year, savedData, holidays, size, orientation);
        printHtmlInFrame(html);
      }
    }

    function buildAllViews() {
      buildScreenYearGrid();
      showStatus(`Loaded ${yearInput.value}. NSW public holidays are included.`);
    }

    document.getElementById("generateBtn").addEventListener("click", buildAllViews);

    document.getElementById("saveBtn").addEventListener("click", () => {
      saveCurrentYear();
      showStatus("Saved to this browser.");
    });

    document.getElementById("printBtn").addEventListener("click", printPlanner);
    document.getElementById("csvBtn").addEventListener("click", exportCSV);
    document.getElementById("clearBtn").addEventListener("click", clearYear);

    yearInput.addEventListener("change", buildAllViews);

    printModeEl.addEventListener("change", () => {
      printMonthEl.disabled = printModeEl.value !== "month";
    });

    printMonthEl.disabled = true;

    buildAllViews();
  </script>
</body>
</html>
