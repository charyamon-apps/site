<script>
  const display = document.getElementById("display");
  const expression = document.getElementById("expression");
  const indicators = document.getElementById("indicators");
  const buttons = document.querySelectorAll("button");

  let sass = document.getElementById("sass");
  if (!sass) {
    sass = document.createElement("div");
    sass.id = "sass";
    sass.style.textAlign = "center";
    sass.style.fontSize = "0.8rem";
    sass.style.color = "rgba(255,255,255,0.75)";
    sass.style.marginTop = "10px";
    sass.style.minHeight = "20px";
    document.querySelector(".calculator").appendChild(sass);
  }

  const sarcasticMessages = [
    "Well, that was thrilling.",
    "Groundbreaking arithmetic.",
    "You could've done that in your head. Maybe.",
    "A calculator was absolutely required for this.",
    "Congrats on the number.",
    "Incredible scenes in basic maths.",
    "You really showed those digits.",
    "That better have been worth it.",
    "Elite button pressing.",
    "Math, but make it dramatic.",
    "Somehow we've arrived at this.",
    "Beautiful. Utterly pointless, but beautiful.",
    "Your Year 4 teacher would be relieved.",
    "There. A number. Try not to spiral.",
    "Honestly, iconic use of a calculator."
  ];

  let current = "0";
  let previous = null;
  let operator = null;
  let waitingForNext = false;
  let memory = 0;

  function randomSass() {
    const msg = sarcasticMessages[Math.floor(Math.random() * sarcasticMessages.length)];
    sass.textContent = msg;
  }

  function clearSass() {
    sass.textContent = "";
  }

  function formatNumber(value) {
    if (value === "Error") return value;
    const num = Number(value);
    if (!Number.isFinite(num)) return "Error";
    return Number.isInteger(num)
      ? num.toLocaleString("en-US")
      : num.toLocaleString("en-US", { maximumFractionDigits: 10 });
  }

  function updateDisplay() {
    display.textContent = current === "Error" ? "Error" : formatNumber(current);
    expression.textContent =
      previous !== null && operator
        ? `${formatNumber(previous)} ${symbolFor(operator)}`
        : "";
    indicators.textContent = memory !== 0 ? "M" : "";
  }

  function symbolFor(op) {
    return { "/": "÷", "*": "×", "-": "−", "+": "+" }[op] || op;
  }

  function inputDigit(digit) {
    if (current === "Error") current = "0";

    if (waitingForNext) {
      current = digit;
      waitingForNext = false;
    } else {
      current = current === "0" ? digit : current + digit;
    }
    clearSass();
    updateDisplay();
  }

  function inputDecimal() {
    if (current === "Error") current = "0";

    if (waitingForNext) {
      current = "0.";
      waitingForNext = false;
    } else if (!current.includes(".")) {
      current += ".";
    }
    clearSass();
    updateDisplay();
  }

  function chooseOperator(nextOperator) {
    if (current === "Error") return;

    const inputValue = parseFloat(current.replace(/,/g, ""));

    if (previous === null) {
      previous = inputValue;
    } else if (operator && !waitingForNext) {
      const result = performCalculation(previous, inputValue, operator);
      current = result === "Error" ? "Error" : String(result);
      previous = result === "Error" ? null : result;
    }

    operator = nextOperator;
    waitingForNext = true;
    clearSass();
    updateDisplay();
  }

  function performCalculation(a, b, op) {
    if (op === "+") return a + b;
    if (op === "-") return a - b;
    if (op === "*") return a * b;
    if (op === "/") return b === 0 ? "Error" : a / b;
    return b;
  }

  function calculateResult() {
    if (operator === null || previous === null || waitingForNext) return;

    const inputValue = parseFloat(current.replace(/,/g, ""));
    const result = performCalculation(previous, inputValue, operator);

    current = result === "Error" ? "Error" : String(result);
    previous = null;
    operator = null;
    waitingForNext = true;
    updateDisplay();

    if (current === "Error") {
      sass.textContent = "Even the calculator has standards.";
    } else {
      randomSass();
    }
  }

  function clearAll() {
    current = "0";
    previous = null;
    operator = null;
    waitingForNext = false;
    clearSass();
    updateDisplay();
  }

  function clearEntry() {
    current = "0";
    clearSass();
    updateDisplay();
  }

  function toggleSign() {
    if (current === "0" || current === "Error") return;
    current = String(parseFloat(current) * -1);
    clearSass();
    updateDisplay();
  }

  function percent() {
    if (current === "Error") return;
    current = String(parseFloat(current) / 100);
    clearSass();
    updateDisplay();
  }

  function memoryAdd() {
    if (current === "Error") return;
    memory += parseFloat(current);
    clearSass();
    updateDisplay();
  }

  function memorySubtract() {
    if (current === "Error") return;
    memory -= parseFloat(current);
    clearSass();
    updateDisplay();
  }

  function memoryRecall() {
    current = String(memory);
    waitingForNext = false;
    clearSass();
    updateDisplay();
  }

  function memoryClear() {
    memory = 0;
    clearSass();
    updateDisplay();
  }

  buttons.forEach((button) => {
    button.addEventListener("click", () => {
      button.classList.add("pressed");
      setTimeout(() => button.classList.remove("pressed"), 80);

      const value = button.dataset.value;
      const action = button.dataset.action;

      if (value !== undefined) {
        if (value === ".") {
          inputDecimal();
        } else if (["+", "-", "*", "/"].includes(value)) {
          chooseOperator(value);
        } else {
          inputDigit(value);
        }
        return;
      }

      if (action === "equals") calculateResult();
      if (action === "clear") clearAll();
      if (action === "clear-entry") clearEntry();
      if (action === "sign") toggleSign();
      if (action === "percent") percent();
      if (action === "mplus") memoryAdd();
      if (action === "mminus") memorySubtract();
      if (action === "mr") memoryRecall();
      if (action === "mc") memoryClear();
    });
  });

  updateDisplay();
</script>
<div id="sass" class="footer-note"></div>
