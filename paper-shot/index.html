<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Shot</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .game-wrap { width: min(100vw, 900px); padding: 12px; }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
      background: #000;
    }

    .info {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 14px;
    }

    .mobile-controls {
      margin-top: 12px;
      background: rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 12px;
    }

    input { width: 100%; }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <canvas id="game" width="900" height="550"></canvas>

    <div class="info">
      <div>Score: <span id="score">0</span></div>
      <div>Shots: <span id="shots">0</span></div>
    </div>

    <div class="mobile-controls">
      Angle <input id="angle" type="range" min="25" max="75" value="45" />
      Power <input id="power" type="range" min="10" max="25" value="15" />
      <button id="shootBtn">Shoot</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const shotsEl = document.getElementById('shots');

    const angleEl = document.getElementById('angle');
    const powerEl = document.getElementById('power');
    const shootBtn = document.getElementById('shootBtn');

    let score = 0;
    let shots = 0;

    // LOAD IMAGE (this is the important fix)
    const bg = new Image();
    bg.src = 'miami-heat.jpg';

    const ball = { x: 150, y: 480, r: 15, vx: 0, vy: 0, flying: false };

    const bin = { x: 600, y: 380, w: 100, h: 100, dir: 1 };

    function drawBackground() {
      if (bg.complete && bg.naturalWidth !== 0) {
        ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = '#222';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawBall() {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBin() {
      ctx.fillStyle = '#ccc';
      ctx.fillRect(bin.x, bin.y, bin.w, bin.h);
    }

    function updateBall() {
      if (!ball.flying) return;

      ball.vy += 0.3;
      ball.x += ball.vx;
      ball.y += ball.vy;

      // score
      if (ball.x > bin.x && ball.x < bin.x + bin.w && ball.y > bin.y) {
        score++;
        resetBall();
      }

      if (ball.y > 550) resetBall();
    }

    function resetBall() {
      ball.x = 150;
      ball.y = 480;
      ball.vx = 0;
      ball.vy = 0;
      ball.flying = false;
      scoreEl.textContent = score;
    }

    function shoot() {
      if (ball.flying) return;

      const angle = angleEl.value * Math.PI / 180;
      const power = powerEl.value;

      ball.vx = Math.cos(angle) * power * 0.5;
      ball.vy = -Math.sin(angle) * power;

      ball.flying = true;
      shots++;
      shotsEl.textContent = shots;

      // CHEER SOUND (simple beep stack)
      const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctxAudio.createOscillator();
      const g = ctxAudio.createGain();
      o.connect(g);
      g.connect(ctxAudio.destination);
      o.frequency.value = 600;
      o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, ctxAudio.currentTime + 0.3);
    }

    shootBtn.addEventListener('click', shoot);

    function updateBin() {
      bin.x += 2 * bin.dir;
      if (bin.x < 500 || bin.x > 750) bin.dir *= -1;
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      updateBin();
      updateBall();
      drawBin();
      drawBall();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
