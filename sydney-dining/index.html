<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Are We Eating or Are We Starving Again?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2d2d2d;
      min-height: 100vh;
      background:
        linear-gradient(rgba(20, 14, 8, 0.55), rgba(20, 14, 8, 0.55)),
        url("food.jpg") center center / cover no-repeat fixed;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .hero {
      background: rgba(255, 248, 241, 0.93);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      color: #241d18;
      line-height: 1.2;
    }

    .subtext {
      margin: 0 0 16px;
      color: #5b4e45;
      line-height: 1.5;
      font-size: 1.04rem;
    }

    .search-box {
      display: grid;
      grid-template-columns: 1.2fr 1fr auto;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid #d7c8bc;
      font-size: 1rem;
    }

    input,
    select {
      background: rgba(255, 255, 255, 0.92);
    }

    button {
      background: #1f1f1f;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      min-width: 170px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .small-note {
      margin-top: 12px;
      font-size: 0.93rem;
      color: #6a5b50;
      line-height: 1.45;
    }

    .status-wrap {
      background: rgba(255, 248, 241, 0.9);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      margin-bottom: 18px;
    }

    .status {
      font-weight: bold;
      color: #3f3229;
      min-height: 24px;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(255, 251, 247, 0.97);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
    }

    .photo-wrap {
      position: relative;
      height: 220px;
      background: #eadfd7;
      overflow: hidden;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      color: #6f6258;
      background: linear-gradient(135deg, rgba(255, 220, 180, 0.8), rgba(255, 245, 230, 0.95));
      font-weight: bold;
      line-height: 1.4;
    }

    .photo-badge {
      position: absolute;
      left: 14px;
      bottom: 14px;
      background: rgba(31, 31, 31, 0.82);
      color: #fff;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      backdrop-filter: blur(3px);
    }

    .card-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .place-name {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.35;
      color: #241d18;
    }

    .rating {
      background: #fff1bf;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.9rem;
      white-space: nowrap;
      color: #594400;
      font-weight: 600;
    }

    .meta {
      color: #5a4d43;
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      display: inline-block;
      background: #f3ece7;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.84rem;
      color: #4f443d;
    }

    .why-box {
      background: #faf4ee;
      border-left: 4px solid #ffb366;
      color: #554941;
      border-radius: 14px;
      padding: 12px;
      font-size: 0.94rem;
      line-height: 1.5;
    }

    .review-disclosure {
      margin-top: 8px;
      font-size: 0.78rem;
      color: #78695f;
      line-height: 1.4;
    }

    .actions {
      margin-top: auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 2px;
    }

    .link-btn,
    .ghost-btn {
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 0.92rem;
      display: inline-block;
    }

    .link-btn {
      background: #1f1f1f;
      color: white;
    }

    .ghost-btn {
      background: #efe7e0;
      color: #2d2d2d;
    }

    @media (max-width: 760px) {
      .search-box {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.8rem;
      }

      .photo-wrap {
        height: 200px;
      }

      button {
        min-width: unset;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>What Are We Eating or Are We Starving Again?</h1>
      <p class="subtext">
        You live in Sydney. There are far too many restaurants. And yet here we are — hungry, dramatic, and somehow unable to choose.
      </p>

      <div class="search-box">
        <input id="locationInput" type="text" placeholder="e.g. CBD, Newtown, Chatswood, Parramatta" />

        <select id="cuisineSelect">
          <option value="any">Any cuisine</option>
          <option value="italian">Italian</option>
          <option value="japanese">Japanese</option>
          <option value="korean">Korean</option>
          <option value="thai">Thai</option>
          <option value="chinese">Chinese</option>
          <option value="vietnamese">Vietnamese</option>
          <option value="indian">Indian</option>
          <option value="filipino">Filipino</option>
          <option value="mexican">Mexican</option>
          <option value="greek">Greek</option>
          <option value="burger">Burgers</option>
          <option value="pizza">Pizza</option>
          <option value="cafe">Café / Brunch</option>
          <option value="seafood">Seafood</option>
          <option value="dessert">Dessert</option>
        </select>

        <button id="searchBtn">End My Food Crisis</button>
      </div>

      <div class="small-note">
        Budget: unclear. Appetite: aggressive. Decision-making skills: absent.
      </div>
    </div>

    <div class="status-wrap">
      <div id="status" class="status">Loading Google Maps magic...</div>
    </div>

    <div id="results" class="results"></div>
  </div>

  <script>
    const locationInput = document.getElementById("locationInput");
    const cuisineSelect = document.getElementById("cuisineSelect");
    const searchBtn = document.getElementById("searchBtn");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");

    let placesLibraryLoaded = false;

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function clearResults() {
      resultsEl.innerHTML = "";
    }

    function escapeHtml(text) {
      if (!text) return "";
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function moneyToText(money) {
      if (!money) return "";
      if (typeof money.toString === "function") {
        return money.toString();
      }

      const currency = money.currencyCode || "$";
      const units = Number(money.units || 0);
      const nanos = Number(money.nanos || 0);
      const amount = units + (nanos / 1000000000);

      return `${currency}${Math.round(amount)}`;
    }

    function formatPriceRange(priceRange) {
      if (!priceRange) {
        return "Price not listed. Financial mystery.";
      }

      const startText = moneyToText(priceRange.startPrice);
      const endText = moneyToText(priceRange.endPrice);

      if (startText && endText) {
        return `${startText}–${endText} per person`;
      }

      if (startText) {
        return `${startText}+ per person`;
      }

      return "Price not listed. Financial mystery.";
    }

    function getPlacePhotoUrl(place) {
      if (!place.photos || !place.photos.length) {
        return "";
      }

      try {
        return place.photos[0].getURI({ maxWidth: 900, maxHeight: 550 });
      } catch (error) {
        console.warn("Photo URL failed:", error);
        return "";
      }
    }

    function getReviewSummaryText(place) {
      const summary = place.reviewSummary;
      if (!summary) return "";

      if (typeof summary.text === "string" && summary.text.trim()) {
        return summary.text.trim();
      }

      if (typeof summary.overview === "string" && summary.overview.trim()) {
        return summary.overview.trim();
      }

      if (summary.description && typeof summary.description.text === "string" && summary.description.text.trim()) {
        return summary.description.text.trim();
      }

      return "";
    }

    function getReviewDisclosureText(place) {
      const summary = place.reviewSummary;
      if (!summary) return "";

      if (typeof summary.disclosureText === "string" && summary.disclosureText.trim()) {
        return summary.disclosureText.trim();
      }

      return "";
    }

    async function initApp() {
      try {
        await google.maps.importLibrary("places");
        placesLibraryLoaded = true;
        setStatus("System ready. Emotional readiness still pending.");
      } catch (error) {
        console.error("Google Maps library failed to load:", error);
        setStatus("Google Maps failed to load. Incredible. Love that for us.");
      }

      searchBtn.addEventListener("click", runSearch);
      locationInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          runSearch();
        }
      });
    }

    async function runSearch() {
      const location = locationInput.value.trim();
      const cuisine = cuisineSelect.value;

      if (!placesLibraryLoaded) {
        setStatus("Google Maps is not ready yet. Much like you before coffee.");
        return;
      }

      if (!location) {
        setStatus("Please enter a location first. The app is helpful, not psychic.");
        return;
      }

      clearResults();
      setStatus("Consulting Google because apparently you cannot choose your own dinner...");

      try {
        const { Place, SearchByTextRankPreference } = await google.maps.importLibrary("places");

        const textQuery =
          cuisine === "any"
            ? `restaurants in ${location}, Sydney NSW`
            : `${cuisine} restaurant in ${location}, Sydney NSW`;

        const request = {
          textQuery,
          fields: [
            "displayName",
            "formattedAddress",
            "rating",
            "userRatingCount",
            "websiteURI",
            "googleMapsURI",
            "googleMapsLinks",
            "nationalPhoneNumber",
            "regularOpeningHours",
            "primaryTypeDisplayName",
            "photos",
            "priceRange",
            "reviewSummary"
          ],
          maxResultCount: 6,
          language: "en-AU",
          region: "au",
          rankPreference: SearchByTextRankPreference.RELEVANCE
        };

        const response = await Place.searchByText(request);
        const places = response.places || [];

        if (!places.length) {
          setStatus("No results. This is either a sign to cook or to lower your standards immediately.");
          return;
        }

        setStatus(`Found ${places.length} options. You will still overthink every single one.`);

        places.forEach((place) => {
          renderCard(place, cuisine);
        });
      } catch (error) {
        console.error("Search error:", error);
        setStatus("Google has failed you. Much like your ability to pick a restaurant.");
      }
    }

    function renderCard(place, cuisine) {
      const card = document.createElement("div");
      card.className = "card";

      const photoUrl = getPlacePhotoUrl(place);
      const name = place.displayName || "Unnamed place";
      const rating = place.rating
        ? `⭐ ${place.rating} (${place.userRatingCount || 0})`
        : "No rating yet";

      const address = place.formattedAddress || "No address listed";
      const phone = place.nationalPhoneNumber || "Phone not listed";
      const mapsLink = place.googleMapsLinks?.placeURI || place.googleMapsURI || "#";
      const reviewsLink = place.googleMapsLinks?.reviewsURI || place.googleMapsURI || "#";
      const photosLink = place.googleMapsLinks?.photosURI || place.googleMapsURI || "#";
      const websiteLink = place.websiteURI || "";
      const priceText = formatPriceRange(place.priceRange);
      const reviewSummaryText = getReviewSummaryText(place);
      const reviewDisclosureText = getReviewDisclosureText(place);

      const typeTag =
        place.primaryTypeDisplayName ||
        (cuisine === "any"
          ? "Restaurant"
          : cuisine.charAt(0).toUpperCase() + cuisine.slice(1));

      let hoursText = "Hours not available";
      if (
        place.regularOpeningHours &&
        Array.isArray(place.regularOpeningHours.weekdayDescriptions) &&
        place.regularOpeningHours.weekdayDescriptions.length > 0
      ) {
        hoursText = "See Google Maps for opening hours";
      }

      const whyPeopleGoHtml = reviewSummaryText
        ? `
          <div class="why-box">
            <strong>Why people go:</strong><br>
            ${escapeHtml(reviewSummaryText)}
            ${
              reviewDisclosureText
                ? `<div class="review-disclosure">${escapeHtml(reviewDisclosureText)}</div>`
                : ""
            }
          </div>
        `
        : `
          <div class="why-box">
            <strong>Why people go:</strong><br>
            No tidy summary yet. This restaurant remains wrapped in mystery, carbs, and online opinion.
          </div>
        `;

      card.innerHTML = `
        <div class="photo-wrap">
          ${
            photoUrl
              ? `<img src="${photoUrl}" alt="${escapeHtml(name)} photo" />`
              : `<div class="photo-fallback">No photo available.<br>Very mysterious. Very probably overpriced.</div>`
          }
          <div class="photo-badge">${escapeHtml(priceText)}</div>
        </div>

        <div class="card-body">
          <div class="title-row">
            <div class="place-name">${escapeHtml(name)}</div>
            <div class="rating">${rating}</div>
          </div>

          <div class="meta">
            <div><strong>Address:</strong> ${escapeHtml(address)}</div>
            <div><strong>Phone:</strong> ${escapeHtml(phone)}</div>
            <div><strong>Status:</strong> ${escapeHtml(hoursText)}</div>
            <div><strong>Cost per person:</strong> ${escapeHtml(priceText)}</div>
          </div>

          <div class="tag-row">
            <span class="tag">${escapeHtml(typeTag)}</span>
            <span class="tag">Sydney</span>
          </div>

          ${whyPeopleGoHtml}

          <div class="actions">
            <a class="link-btn" href="${mapsLink}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a>
            <a class="ghost-btn" href="${reviewsLink}" target="_blank" rel="noopener noreferrer">Read Reviews</a>
            <a class="ghost-btn" href="${photosLink}" target="_blank" rel="noopener noreferrer">See Photos</a>
            ${
              websiteLink
                ? `<a class="ghost-btn" href="${websiteLink}" target="_blank" rel="noopener noreferrer">Website</a>`
                : ""
            }
          </div>
        </div>
      `;

      resultsEl.appendChild(card);
    }

    window.initApp = initApp;
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCPp3yhm0_D9WNb61NImlSyjEDUFyzs3tk&loading=async&callback=initApp"
    async
    defer
  ></script>
</body>
</html>
